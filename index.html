<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TikTok Live - Auto Battle Edition</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap');
body{ margin:0; overflow:hidden; background:black; font-family: 'Orbitron', sans-serif; touch-action: none; }
canvas{ display:block; }
#overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: radial-gradient(circle, rgba(20,20,30,0.95) 0%, rgba(0,0,0,1) 100%);
    color: #0ff; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100;
}
#start-btn { padding: 20px 40px; font-size: 24px; font-family: 'Orbitron', sans-serif; background: transparent; color: #0ff; border: 3px solid #0ff; cursor: pointer; text-transform: uppercase; box-shadow: 0 0 15px #0ff; }
#lose-ui { position: absolute; top: 30%; width: 100%; text-align: center; display: none; z-index: 10; }
.text-lose { font-size: 45px; font-weight: 900; color: #ff0055; text-shadow: 0 0 20px #ff0055; margin: 0; }
#anime-char { position: absolute; pointer-events: none; width: 85px; height: 85px; z-index: 2; display: none; filter: drop-shadow(0 0 10px #0ff); }
.spawned-anim { position: absolute; width: 100px; height: 100px; pointer-events: none; z-index: 1; filter: drop-shadow(0 0 15px #ff0055); }
</style>
</head>
<body>

<div id="overlay">
    <h1 style="text-shadow: 0 0 20px #0ff;">CYBER BATTLE</h1>
    <button id="start-btn" onclick="initGame()">MULAI PERANG</button>
</div>

<div id="lose-ui"><p class="text-lose">PLAYER K.O.</p></div>
<img id="anime-char" src="https://i.gifer.com/XOsX.gif" alt="player">
<canvas id="game"></canvas>
<div id="boss-container"></div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const animeEl = document.getElementById("anime-char");
const bossContainer = document.getElementById("boss-container");
const loseUI = document.getElementById("lose-ui");

let dpr = window.devicePixelRatio || 1;
let playableHeight, hp = 100, gameOver = false, shake = 0;
let sandals = [], pups = [], monsters = [], explosions = []; 
let lastDamageTime = Date.now();
let lastFireTime = 0; // Untuk jeda auto-fire

let player = { x: 0, y: 0, autoDir: 3.2, isManual: false };

const buttons = [
    { imgSrc: "https://images4.alphacoders.com/129/thumb-350-1291904.webp", gif: "https://media4.giphy.com/media/v1.Y2lkPTZjMDliOTUyYnA0am53NHdlbzBtYng5aDZ5a2lpanBhMmE1dWlpam5kempwM2s4cSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/pwWaY9rHspjc9lKzYI/giphy.gif" },
    { imgSrc: "https://images7.alphacoders.com/135/thumb-350-1357461.webp", gif: "https://media2.giphy.com/media/v1.Y2lkPTZjMDliOTUydXZqZGd5bjZwdHFoOTRtanAzbWJheXUwcG1kdjY5cXd3bDNhNHYzOSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/2wgTJAEa5YGhUpowOW/giphy.gif" },
    { imgSrc: "https://avatarfiles.alphacoders.com/352/thumb-350-352798.webp", gif: "https://media4.giphy.com/media/v1.Y2lkPTZjMDliOTUyemRkem5neGdlY2xhc2pkeGhlbjk1c3U0b3dndHVlZWYybGEyMTAzYiZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/IUiLMgsBmb3zi/giphy.gif" },
    { imgSrc: "https://images5.alphacoders.com/532/thumb-350-532559.webp", gif: "https://media4.giphy.com/media/v1.Y2lkPTZjMDliOTUyMXh5dmd4Y2hkMDk3eDVzb3QweG1tbTM3ajNjNjIwcGljZGtrZWpqciZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/7DtA5riKTwHljx4Fdr/giphy.gif" },
    { imgSrc: "https://avatarfiles.alphacoders.com/375/thumb-350-375473.webp", gif: "https://media1.giphy.com/media/v1.Y2lkPTZjMDliOTUyc29obGtqZTMyb2gzdmVmb3pubmZya2xjenR0azJ0amw4dnFmd3ZuMSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/7BW9U2cJPQZ0s/giphy.gif" }
];

function resize() {
    dpr = window.devicePixelRatio || 1;
    canvas.width = window.innerWidth * dpr; canvas.height = window.innerHeight * dpr;
    canvas.style.width = window.innerWidth + 'px'; canvas.style.height = window.innerHeight + 'px';
    ctx.scale(dpr, dpr); playableHeight = window.innerHeight * 0.65; player.x = window.innerWidth / 2;
}
window.addEventListener("resize", resize); resize();
buttons.forEach(btn => { let img = new Image(); img.src = btn.imgSrc; btn.imgObj = img; });

function addExplosion(x, y) { explosions.push({ x, y, size: 20, timer: 15 }); }

function spawnMonster(gifUrl) {
    let img = document.createElement("img"); img.src = gifUrl; img.className = "spawned-anim";
    bossContainer.appendChild(img);
    monsters.push({ 
        x: Math.random()*(window.innerWidth-110), y: 60 + Math.random()*160, 
        spawnTime: Date.now(), dir: (Math.random()>0.5?1:-1) * 2.8, el: img 
    });
}

function initGame() {
    document.getElementById("overlay").style.display = "none"; loseUI.style.display = "none";
    animeEl.style.display = "block"; hp = 100; gameOver = false;
    sandals = []; pups = []; monsters = []; explosions = []; bossContainer.innerHTML = "";
    update();
}

function update() {
    if (gameOver) return;
    const sw = window.innerWidth, sh = window.innerHeight;
    let now = Date.now();

    // Auto Fire Logic: Tembak jika ada monster
    if (monsters.length > 0 && now - lastFireTime > 400) { // Tembak setiap 0.4 detik
        pups.push({ x: player.x, y: player.y, speed: 8, angle: 0 });
        lastFireTime = now;
    }
    
    let sx = (Math.random()-0.5) * shake;
    let sy = (Math.random()-0.5) * shake;
    ctx.setTransform(dpr, 0, 0, dpr, sx, sy);
    if(shake > 0) shake *= 0.85;

    ctx.clearRect(-50, -50, sw+100, sh+100);
    if (now - lastDamageTime > 5000 && hp < 100) hp += 0.05; 

    player.y = playableHeight - 90;
    if (!player.isManual) { player.x += player.autoDir; if (player.x > sw - 45 || player.x < 45) player.autoDir *= -1; }
    animeEl.style.left = (player.x - 42) + "px"; 
    animeEl.style.top = (player.y - 15 + (Math.sin(now*0.01)*5)) + "px";
    animeEl.style.transform = `scaleX(${player.autoDir > 0 ? 1 : -1})`;

    // Monsters Logic
    monsters.forEach((m, i) => {
        if (now - m.spawnTime > 10000) { m.el.remove(); monsters.splice(i,1); return; } // Hidup lebih lama agar bisa ditembak
        m.x += m.dir; if (m.x < 0 || m.x > sw-110) m.dir *= -1;
        m.el.style.left = m.x+"px"; m.el.style.top = m.y+"px";
        if (Math.random() < 0.035) sandals.push({ x: m.x+50, y: m.y+80 });
    });

    // Pups Logic (Damage ke NPC & Sendal)
    pups.forEach((p, i) => {
        p.y -= p.speed;
        p.angle += 0.15;
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.angle);
        ctx.font = "14px Arial"; ctx.fillText("🔥", -5, 20);
        ctx.font = "28px Arial"; ctx.fillText("💩", -14, 0);
        ctx.restore();

        // Cek Damage ke NPC
        monsters.forEach((m, mi) => {
            if (p.x > m.x && p.x < m.x + 100 && p.y > m.y && p.y < m.y + 100) {
                addExplosion(m.x + 50, m.y + 50);
                m.el.remove(); monsters.splice(mi, 1); // NPC Hancur
                pups.splice(i, 1); // Pup Hilang
            }
        });

        if (p.y < -30) pups.splice(i, 1);
    });

    // Sandals Logic (Tanpa Asap)
    sandals.forEach((s, i) => {
        s.y += 7;
        ctx.font = "28px Arial"; ctx.fillText("🩴", s.x - 14, s.y); // Hapus efek asap
        
        pups.forEach((p, pi) => {
            if (Math.abs(p.x - s.x) < 25 && Math.abs(p.y - s.y) < 25) {
                addExplosion(s.x, s.y);
                sandals.splice(i,1); pups.splice(pi,1);
            }
        });

        if (s.x > player.x-40 && s.x < player.x+40 && s.y > player.y && s.y < player.y+80) {
            hp -= 2; lastDamageTime = now;
            addExplosion(player.x, player.y + 30);
            sandals.splice(i,1); shake = 15;
        }
        if (s.y > playableHeight) sandals.splice(i,1);
    });

    explosions.forEach((ex, i) => {
        ctx.font = (ex.size + 15) + "px Arial";
        ctx.fillText("💥", ex.x - 20, ex.y + 10);
        ex.timer--; ex.size += 2;
        if (ex.timer <= 0) explosions.splice(i, 1);
    });

    // UI
    ctx.fillStyle = "#111"; ctx.fillRect(0, 0, sw, 50);
    ctx.fillStyle = "#0ff"; ctx.fillRect(0, 45, sw * (hp/100), 5);
    ctx.font = "900 16px 'Orbitron'"; ctx.textAlign = "center";
    ctx.fillText("SYSTEM HP: " + Math.max(0, Math.floor(hp)) + "%", sw/2, 32);
    ctx.fillStyle = "#050505"; ctx.fillRect(0, playableHeight, sw, sh-playableHeight);
    
    let btnSize = 60, gap = 12;
    let totalWidth = (buttons.length * btnSize) + ((buttons.length - 1) * gap);
    let startX = (sw - totalWidth) / 2;
    buttons.forEach((btn, i) => {
        btn.x = startX + i*(btnSize + gap); btn.y = playableHeight + 20; btn.w = btnSize; btn.h = btnSize;
        ctx.strokeStyle = "#0ff"; ctx.strokeRect(btn.x, btn.y, btnSize, btnSize);
        if (btn.imgObj && btn.imgObj.complete) ctx.drawImage(btn.imgObj, btn.x+2, btn.y+2, btnSize-4, btnSize-4);
    });

    let bW = sw * 0.43, bH = 45, bG = 12;
    let bX = sw/2 - (bW * 2 + bG) / 2;
    let bY = playableHeight + 20 + btnSize + 15;

    ctx.strokeStyle = "#ff0055"; ctx.strokeRect(bX, bY, bW, bH);
    ctx.fillStyle = "#ff0055"; ctx.font = "bold 10px 'Orbitron'"; ctx.fillText("RANDOM NPC", bX+bW/2, bY+28);

    ctx.strokeStyle = "#00ffaa"; ctx.strokeRect(bX + bW + bG, bY, bW, bH);
    ctx.fillStyle = "#00ffaa"; ctx.fillText("ALL SPAWN", bX+bW+bG+bW/2, bY+28);

    if (hp <= 0) { gameOver = true; loseUI.style.display = "block"; animeEl.style.display = "none"; setTimeout(initGame, 4000); }
    else { requestAnimationFrame(update); }
}

function handleInput(clientX, clientY) {
    let rect = canvas.getBoundingClientRect();
    let mx = clientX - rect.left, my = clientY - rect.top;
    buttons.forEach(btn => { if (mx > btn.x && mx < btn.x+btn.w && my > btn.y && my < btn.y+btn.h) { spawnMonster(btn.gif); } });
    
    let bW = window.innerWidth * 0.43, bH = 45, bG = 12;
    let bX = window.innerWidth/2 - (bW * 2 + bG) / 2;
    let bY = playableHeight + 20 + 60 + 15;

    if (mx > bX && mx < bX+bW && my > bY && my < bY+bH) { spawnMonster(buttons[Math.floor(Math.random()*buttons.length)].gif); }
    if (mx > bX+bW+bG && mx < bX+bW+bG+bW && my > bY && my < bY+bH) {
        shake = 20; buttons.forEach(b => spawnMonster(b.gif));
    }
}
canvas.addEventListener("mousedown", e => handleInput(e.clientX, e.clientY));
canvas.addEventListener("touchstart", e => { handleInput(e.touches[0].clientX, e.touches[0].clientY); });
canvas.addEventListener("touchmove", e => {
    let ty = e.touches[0].clientY - canvas.getBoundingClientRect().top;
    if (ty < playableHeight) { player.isManual = true; player.x = e.touches[0].clientX - canvas.getBoundingClientRect().left; }
});
</script>
</body>
</html>
