<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TikTok Live - Player Fix Edition</title>
<style>
body{ margin:0; overflow:hidden; background:black; font-family:Arial; touch-action: none; }
canvas{ display:block; }
#overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.9); color: white;
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    z-index: 100;
}
#start-btn { padding: 20px 40px; font-size: 20px; background: #333; color: white; border: 2px solid #fff; border-radius: 10px; cursor: pointer; }

#lose-ui {
    position: absolute; top: 30%; width: 100%; text-align: center; display: none; z-index: 10;
}
.text-lose { font-size: 60px; font-weight: bold; color: #ff0000; text-shadow: 0 0 20px #ff0000, 0 0 40px #000; margin: 0; }
.text-win { font-size: 30px; font-weight: bold; color: #ffffff; text-shadow: 0 0 15px #ff00cc; margin-top: 10px; }

#anime-char { position: absolute; pointer-events: none; width: 100px; height: 100px; z-index: 2; display: none; }

/* Tambahan Style untuk Nama NPC */
.npc-container {
    position: absolute;
    display: flex;
    flex-direction: column;
    align-items: center;
    pointer-events: none;
    z-index: 1;
}
.npc-name {
    color: white;
    font-size: 14px;
    font-weight: bold;
    text-shadow: 2px 2px 2px black;
    background: rgba(0,0,0,0.4);
    padding: 2px 6px;
    border-radius: 5px;
    margin-bottom: 2px;
    white-space: nowrap;
}
.spawned-anim { width: 110px; height: 110px; }
</style>
</head>
<body>

<div id="overlay">
    <h2>FIX PLAYER MOVE</h2>
    <p>Player sekarang sudah bergerak otomatis lagi!</p>
    <button id="start-btn" onclick="initGame()">MULAI GAME</button>
</div>

<div id="lose-ui">
    <p class="text-lose">💀 YOU LOSE</p>
    <p class="text-win">🏆 VIEWERS WIN! 🏆</p>
</div>

<img id="anime-char" src="https://i.gifer.com/XOsX.gif" alt="player">
<canvas id="game"></canvas>
<div id="boss-container"></div>

<script>
// --- BAGIAN TAMBAHAN UNTUK WEBHOOK TIKFINITY ---
const urlParams = new URLSearchParams(window.location.search);
const giftUser = urlParams.get('user');

// Fungsi ini akan berjalan otomatis jika link dibuka via Webhook TikFinity
if (giftUser) {
    // Menunggu game siap sebentar lalu spawn monster
    setTimeout(() => {
        if (typeof spawnMonster === "function") {
            const randomGif = buttons[Math.floor(Math.random() * 5)].gif; 
            spawnMonster(randomGif, giftUser);
        }
    }, 1500);
}
// ----------------------------------------------

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const animeEl = document.getElementById("anime-char");
const bossContainer = document.getElementById("boss-container");
const loseUI = document.getElementById("lose-ui");

let playableHeight, hp = 100, gameStarted = false, gameOver = false;
let bombs = [], monsters = []; 
let lastDamageTime = Date.now();
let player = { x: window.innerWidth/2, y: 0, autoDir: 2.5, isManual: false };

const buttons = [
    { imgSrc: "https://images4.alphacoders.com/129/thumb-350-1291904.webp", gif: "https://media4.giphy.com/media/v1.Y2lkPTZjMDliOTUyYnA0am53NHdlbzBtYng5aDZ5a2lpanBhMmE1dWlpam5kempwM2s4cSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/pwWaY9rHspjc9lKzYI/giphy.gif", imgObj: null, flash: 0 },
    { imgSrc: "https://images7.alphacoders.com/135/thumb-350-1357461.webp", gif: "https://media2.giphy.com/media/v1.Y2lkPTZjMDliOTUydXZqZGd5bjZwdHFoOTRtanAzbWJheXUwcG1kdjY5cXd3bDNhNHYzOSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/2wgTJAEa5YGhUpowOW/giphy.gif", imgObj: null, flash: 0 },
    { imgSrc: "https://avatarfiles.alphacoders.com/352/thumb-350-352798.webp", gif: "https://media4.giphy.com/media/v1.Y2lkPTZjMDliOTUyemRkem5neGdlY2xhc2pkeGhlbjk1c3U0b3dndHVlZWYybGEyMTAzYiZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/IUiLMgsBmb3zi/giphy.gif", imgObj: null, flash: 0 },
    { imgSrc: "https://images5.alphacoders.com/532/thumb-350-532559.webp", gif: "https://media4.giphy.com/media/v1.Y2lkPTZjMDliOTUyMXh5dmd4Y2hkMDk3eDVzb3QweG1tbTM3ajNjNjIwcGljZGtrZWpqciZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/7DtA5riKTwHljx4Fdr/giphy.gif", imgObj: null, flash: 0 },
    { imgSrc: "https://avatarfiles.alphacoders.com/375/thumb-350-375473.webp", gif: "https://media1.giphy.com/media/v1.Y2lkPTZjMDliOTUyc29obGtqZTMyb2gzdmVmb3pubmZya2xjenR0azJ0amw4dnFmd3ZuMSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/7BW9U2cJPQZ0s/giphy.gif", imgObj: null, flash: 0 },
    { imgSrc: "https://picsum.photos/id/60/100/100", gif: "https://media.giphy.com/media/v1.Y2lkPTZjMDliOTUyeG9yeXJueW1icXN6Z3RyeXp6eHh4eHh4eHh4eHh4eHh4eHh4JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1n/3o7TKMGx6QZpS5PZte/giphy.gif", imgObj: null, flash: 0 },
    { imgSrc: "https://picsum.photos/id/70/100/100", gif: "https://media.giphy.com/media/v1.Y2lkPTZjMDliOTUyeG9yeXJueW1icXN6Z3RyeXp6eHh4eHh4eHh4eHh4eHh4eHh4JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1n/3o7TKVUn7iM8FMEU24/giphy.gif", imgObj: null, flash: 0 },
    { imgSrc: "https://picsum.photos/id/80/100/100", gif: "https://media.giphy.com/media/v1.Y2lkPTZjMDliOTUyeG9yeXJueW1icXN6Z3RyeXp6eHh4eHh4eHh4eHh4eHh4eHh4JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1n/l41lTfuxmSXYGz_9C/giphy.gif", imgObj: null, flash: 0 },
    { imgSrc: "https://picsum.photos/id/90/100/100", gif: "https://media4.giphy.com/media/v1.Y2lkPTZjMDliOTUyemRkem5neGdlY2xhc2pkeGhlbjk1c3U0b3dndHVlZWYybGEyMTAzYiZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/r88w2d7tHqazFwNEGN/giphy.gif", imgObj: null, flash: 0 },
    { imgSrc: "https://picsum.photos/id/100/100/100", gif: "https://media.giphy.com/media/v1.Y2lkPTZjMDliOTUyeG9yeXJueW1icXN6Z3RyeXp6eHh4eHh4eHh4eHh4eHh4eHh4JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1n/3o7TKMGpxx7SClHhSg/giphy.gif", imgObj: null, flash: 0 }
];

buttons.forEach(btn => {
    let img = new Image();
    img.src = btn.imgSrc;
    btn.imgObj = img;
});

function resize() {
    canvas.width = window.innerWidth; 
    canvas.height = window.innerHeight;
    playableHeight = canvas.height * 0.65;
}
window.addEventListener("resize", resize); 
resize();

function spawnMonster(gifUrl, name = "Viewer") {
    let container = document.createElement("div");
    container.className = "npc-container";
    
    let nameTag = document.createElement("div");
    nameTag.className = "npc-name";
    nameTag.innerText = name;

    let img = document.createElement("img");
    img.src = gifUrl; 
    img.className = "spawned-anim";
    
    container.appendChild(nameTag);
    container.appendChild(img);
    bossContainer.appendChild(container);

    monsters.push({ 
        x: Math.random()*(canvas.width-110), y: 50 + Math.random()*100, 
        spawnTime: Date.now(), dir: (Math.random()>0.5?1:-1) * 1.5, el: container 
    });
}

function initGame() {
    document.getElementById("overlay").style.display = "none";
    loseUI.style.display = "none";
    animeEl.style.display = "block";
    hp = 100; gameStarted = true; gameOver = false;
    bombs = []; monsters = []; bossContainer.innerHTML = "";
    lastDamageTime = Date.now();
    player.isManual = false; 
    update();
}

function update() {
    if (gameOver) return;
    ctx.clearRect(0,0,canvas.width,canvas.height);
    
    if (Date.now() - lastDamageTime > 5000 && hp < 100) {
        hp += 0.05; 
    }

    player.y = playableHeight - 80;
    if (!player.isManual) {
        player.x += player.autoDir;
        if (player.x > canvas.width - 50 || player.x < 50) {
            player.autoDir *= -1;
        }
    }

    animeEl.style.left = (player.x-50)+"px"; 
    animeEl.style.top = (player.y-20)+"px";

    let now = Date.now();
    monsters.forEach((m, i) => {
        if (now - m.spawnTime > 4000) { m.el.remove(); monsters.splice(i,1); return; }
        m.x += m.dir; if (m.x < 0 || m.x > canvas.width-110) m.dir *= -1;
        m.el.style.left = m.x+"px"; m.el.style.top = m.y+"px";
        if (Math.random() < 0.02) bombs.push({ x: m.x+55, y: m.y+80 });
    });

    bombs.forEach((b, i) => {
        b.y += 5;
        ctx.font = "30px Arial"; ctx.fillText("⚔️", b.x, b.y);
        if (b.x > player.x-45 && b.x < player.x+45 && b.y > player.y && b.y < player.y+80) {
            hp -= 0.67; 
            lastDamageTime = Date.now();
            bombs.splice(i,1);
        }
        if (b.y > playableHeight) bombs.splice(i,1);
    });

    ctx.fillStyle = "#222"; ctx.fillRect(0,0,canvas.width,45);
    ctx.fillStyle = hp > 30 ? "#00ffaa" : "#ff3300";
    ctx.fillRect(0,0,canvas.width*(hp/100),45);
    
    ctx.fillStyle = "white";
    ctx.font = "bold 20px Arial";
    ctx.textAlign = "center";
    ctx.fillText("HOST HP: " + Math.max(0, Math.floor(hp)) + "%", canvas.width/2, 30);
    
    ctx.fillStyle = "black"; ctx.fillRect(0, playableHeight, canvas.width, canvas.height-playableHeight);
    
    let btnW = 60, btnH = 60, gap = 12;
    let startX = canvas.width/2 - (5*btnW + 4*gap)/2;
    
    buttons.forEach((iBtn, i) => {
        let row = Math.floor(i / 5);
        let col = i % 5;
        iBtn.x = startX + col*(btnW + gap);
        iBtn.y = playableHeight + 45 + row*(btnH + gap);
        iBtn.w = btnW; iBtn.h = btnH;
        
        if (iBtn.imgObj && iBtn.imgObj.complete) {
            ctx.drawImage(iBtn.imgObj, iBtn.x, iBtn.y, btnW, btnH);
        } else {
            ctx.fillStyle = "#444"; ctx.fillRect(iBtn.x, iBtn.y, btnW, btnH);
        }

        if (iBtn.flash > 0) {
            ctx.fillStyle = "rgba(255, 255, 255, 0.4)";
            ctx.fillRect(iBtn.x, iBtn.y, btnW, btnH);
            iBtn.flash--;
        }
    });

    if (hp <= 0) {
        gameOver = true; 
        loseUI.style.display = "block";
        animeEl.style.display = "none";
        bossContainer.innerHTML = "";
        setTimeout(initGame, 4000); 
    } else { requestAnimationFrame(update); }
}

canvas.addEventListener("mousedown", e => {
    let rect = canvas.getBoundingClientRect();
    let mx = e.clientX - rect.left, my = e.clientY - rect.top;
    buttons.forEach(btn => {
        if (mx > btn.x && mx < btn.x+btn.w && my > btn.y && my < btn.y+btn.h) {
            btn.flash = 5; 
            spawnMonster(btn.gif, "TESTER"); 
        }
    });
});

canvas.addEventListener("touchmove", e => {
    let rect = canvas.getBoundingClientRect();
    let tx = e.touches[0].clientX - rect.left;
    let ty = e.touches[0].clientY - rect.top;
    if (ty < playableHeight) { 
        player.isManual = true; 
        player.x = tx; 
    }
});
</script>
</body>
</html>
