    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const user = urlParams.get('user');
        const button = urlParams.get('button');

        // Data dari screenshot kamu
        const appId = "2123632";
        const key = "fc2cc49f725032db8a58";
        const secret = "b0c10c386ee7a565e228";

        if (user && button !== null) {
            // Menggunakan jembatan eksternal agar tidak kena blokir browser (CORS)
